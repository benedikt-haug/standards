kind: Shoot
apiVersion: core.gardener.cloud/v1beta1
metadata:
  name: conf-shoot
spec:
  provider:
    type: openstack
    infrastructureConfig:
      apiVersion: openstack.provider.extensions.gardener.cloud/v1alpha1
      kind: InfrastructureConfig
      networks:
        workers: 10.250.0.0/16
      floatingPoolName: external
    controlPlaneConfig:
      apiVersion: openstack.provider.extensions.gardener.cloud/v1alpha1
      kind: ControlPlaneConfig
      loadBalancerProvider: ovn
    workers:
      - name: worker-pool-1
        minimum: 1
        maximum: 2
        maxSurge: 1
        machine:
          type: SCS-1V-16-50
          image:
            name: flatcar
            version: 4081.3.6
          architecture: amd64
        zones:
          - nbg1
        cri:
          name: containerd
  networking:
    nodes: 10.250.0.0/16
    type: cilium
  kubernetes:
    version: 1.34.5
  cloudProfile:
    name: openstack
    kind: CloudProfile
  credentialsBindingName: default-openstack-secret
  purpose: evaluation
  region: nsc-nbg
  addons:
    kubernetesDashboard:
      enabled: false
    nginxIngress:
      enabled: false
  maintenance:
    autoUpdate:
      kubernetesVersion: true
      machineImageVersion: true
    timeWindow:
      begin: "020000+0100"
      end: "030000+0100"