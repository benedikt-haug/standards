# A unique name for this test run. This will also be used as the shoot cluster name.
name: conf-shoot

plugin:
  # Use the 'gardener' plugin we created.
  name: gardener

  # Define the templates the plugin will use. These files are in the same directory.
  templates:
    shoot: shoot.yaml.j2
    kubeconfig: garden-kubeconfig.yaml.j2

  # These are variables that will be injected into the templates.
  vars:
    garden_namespace: "garden-g5lxqfthcn"
    context_name: "garden-g5lxqfthcn-conformancetest"
    user_name: "conformancetest"
    kubernetes_version: "1.34.5"
    num_worker_nodes: 1
    worker_cidr: "10.250.0.0/16"
    machine_type: "SCS-1V-16-50"
    machine_image_name: "flatcar"
    machine_image_version: "4081.3.6"
    region: "nsc-nbg"
    zone: "nbg1"
    floating_pool_name: "external"
    load_balancer_provider: "ovn"
    cloud_profile_name: "openstack"
    credentials_binding_name: "default-openstack-secret"

  # These are secrets that will be injected into the templates.
  # The values should be provided securely at runtime (e.g., via environment variables or a secrets manager).
  secrets:
    garden_api_server: "{{ env.GARDEN_API_SERVER }}"
    garden_ca_data: "{{ env.GARDEN_CA_DATA }}"
    garden_token: "{{ env.GARDEN_TOKEN }}"
